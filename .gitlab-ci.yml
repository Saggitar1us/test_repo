stages:
  - test
  - report

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONUNBUFFERED: "1"

default:
  image: mcr.microsoft.com/playwright/python:v1.58.0-jammy
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements.txt

ui_tests:
  stage: test
  script:
    - pytest -v --junitxml=reports/junit.xml --html=reports/report.html --self-contained-html --alluredir=allure-results
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports
      - allure-results
    reports:
      junit: reports/junit.xml

pages:
  stage: report
  image: openjdk:17-jdk-slim
  needs:
    - job: ui_tests
      artifacts: true
  script:
    - apt-get update && apt-get install -y wget unzip
    - wget -qO /tmp/allure.zip https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.zip
    - unzip -q /tmp/allure.zip -d /opt
    - /opt/allure-2.29.0/bin/allure generate allure-results -o public --clean
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH
